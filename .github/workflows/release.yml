name: Release

on:
  push:
    tags: ["v*"]

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          # Extract changelog section for this version
          CHANGELOG=$(awk -v tag="$TAG" '
            BEGIN { found=0 }
            /^# / {
              if (found) exit
              if ($0 == "# " tag) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')

          if [ -z "$CHANGELOG" ]; then
            echo "::error::No changelog entry found for $TAG in CHANGELOG.md"
            exit 1
          fi

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists. Updating with changelog."
            printf '%s\n' "$CHANGELOG" > /tmp/release_body.md
            gh release edit "$TAG" --title "$TAG" --notes-file /tmp/release_body.md
          else
            printf '%s\n' "$CHANGELOG" > /tmp/release_body.md
            gh release create "$TAG" --verify-tag --title "$TAG" --notes-file /tmp/release_body.md
          fi

      - name: Rokit Cache Restore
        id: cache-rokit
        uses: actions/cache/restore@v5
        with:
          path: ~/.rokit
          key: rokit-${{ hashFiles('rokit.toml') }}

      - name: Install Rokit
        if: steps.cache-rokit.outputs.cache-hit != 'true'
        run: curl -fsSL https://raw.githubusercontent.com/rojo-rbx/rokit/main/scripts/install.sh | bash

      - name: Install Tools
        run: |
          export PATH="$HOME/.rokit/bin:$PATH"
          rokit install --trust-all

      - name: Rokit Cache Save
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ~/.rokit
          key: rokit-${{ hashFiles('rokit.toml') }}

      - name: Publish to Wally
        run: |
          export PATH="$HOME/.rokit/bin:$PATH"
          mkdir -p ~/.wally
          cat > ~/.wally/auth.toml << 'EOF'
          [tokens]
          "https://api.wally.run/" = "${{ secrets.WALLY_TOKEN }}"
          EOF
          wally publish
